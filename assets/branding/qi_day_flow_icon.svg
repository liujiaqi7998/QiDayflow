<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Qi Day Flow app icon</title>
  <desc id="desc">A luminous Q-shaped time flow with clock hands on a dark rounded square.</desc>
  <defs>
    <linearGradient id="background" x1="32" y1="20" x2="224" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182A50"/>
      <stop offset="0.55" stop-color="#101A36"/>
      <stop offset="1" stop-color="#090E20"/>
    </linearGradient>
    <linearGradient id="flow" x1="54" y1="54" x2="207" y2="207" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4DE3FF"/>
      <stop offset="0.5" stop-color="#4C8DFF"/>
      <stop offset="1" stop-color="#9A6BFF"/>
