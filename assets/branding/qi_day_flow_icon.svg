  <circle cx="120" cy="116" r="66" fill="#142143" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="120" cy="116" r="66" fill="none" stroke="url(#flow)" stroke-width="22"/>
  <path d="M164 160L195 191" fill="none" stroke="url(#flow)" stroke-width="22" stroke-linecap="round"/>

  <path d="M120 116V78" fill="none" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round"/>
  <path d="M120 116L151 132" fill="none" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round"/>
  <circle cx="120" cy="116" r="10" fill="#FFFFFF"/>
