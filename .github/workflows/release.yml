name: Windows release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build and publish Windows x64
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          cmake --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Run Flutter tests
        run: flutter test --no-pub

      - name: Build Windows release
        run: flutter build windows --release --no-pub

      - name: Build native regression tests
        run: >-
          cmake --build build\windows\x64 --config Release --target
          qi_day_flow_capture_pixel_buffer_test
          qi_day_flow_capture_runtime_test
          qi_day_flow_frame_similarity_test
          qi_day_flow_native_frame_logger_test
          qi_day_flow_tray_menu_state_test
          qi_day_flow_startup_behavior_test
          qi_day_flow_exit_lifecycle_test

      - name: Run native regression tests
        shell: pwsh
        run: |
          $release = "build\windows\x64\runner\Release"
          & "$release\qi_day_flow_capture_pixel_buffer_test.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$release\qi_day_flow_capture_runtime_test.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$release\qi_day_flow_frame_similarity_test.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$release\qi_day_flow_native_frame_logger_test.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$release\qi_day_flow_tray_menu_state_test.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$release\qi_day_flow_startup_behavior_test.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "$release\qi_day_flow_exit_lifecycle_test.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package release
        id: package
        shell: pwsh
        run: |
          $safeTag = "${{ github.ref_name }}" -replace '[^0-9A-Za-z._-]', '-'
          $product = "QiDayFlow-$safeTag-windows-x64"
          $staging = Join-Path "dist" $product
          $release = "build\windows\x64\runner\Release"

          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "$release\*" $staging -Recurse -Force
          Remove-Item "$staging\qi_day_flow_*_test.*" -Force -ErrorAction SilentlyContinue

          $archive = Join-Path "dist" "$product.zip"
          Compress-Archive -Path "$staging\*" -DestinationPath $archive -CompressionLevel Optimal
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          "$hash  $product.zip" | Set-Content -Encoding ascii "$archive.sha256"

          "product=$product" >> $env:GITHUB_OUTPUT
          "archive=$archive" >> $env:GITHUB_OUTPUT
          "checksum=$archive.sha256" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.product }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Qi Day Flow ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
